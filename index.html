<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T-Shirts</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19",
          "react-dom/client": "https://esm.sh/react-dom@19/client",
          "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="t-shirts.js"></script>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from "https://esm.sh/react@19";
      import ReactDOM from "https://esm.sh/react-dom@19/client";
      const root = ReactDOM.createRoot(document.getElementById("root"));

      const Card = ({ card, buyHandler }) => {
        const [amount, setAmount] = useState(1);

        const clickHandler = () => {
          let buyAmount = amount;

          if (buyAmount < 1) buyAmount = 1;
          if (buyAmount > card.stock) buyAmount = card.stock;

          if (card.stock <= 0) return;

          buyHandler(card, buyAmount);
          setAmount(1);
        };

        return (
          <div className="card">
            <p>{card.title}</p>
            <img src={"images/" + card.image} alt={card.title} width="80%" />
            <p>{card.price}</p>
            <p>{card.stock <= 0 ? "Out of Stock" : card.stock + " left!"}</p>
            <label>
              Amount:
              <input
                type="number"
                min="1"
                max={card.stock}
                value={amount}
                onChange={(event) => setAmount(Number(event.target.value))}
                disabled={card.stock <= 0}
              />
            </label>
            <button onClick={clickHandler} disabled={card.stock <= 0}>
              Buy
            </button>
          </div>
        );
      };

      const CardList = ({ cards, buyHandler }) => {
        return (
          <div className="cards">
            {cards.map((card) => (
              <Card key={card.title} card={card} buyHandler={buyHandler} />
            ))}
          </div>
        );
      };

      const App = () => {
        const [cards, setCards] = useState(() => {
          const savedCards = localStorage.getItem("cards");
          return savedCards ? JSON.parse(savedCards) : tshirts;
        });

        useEffect(() => {
          localStorage.setItem("cards", JSON.stringify(cards));
        }, cards);

        const buyHandler = (card, amount) => {
          setCards((pre) => {
            return pre.map((p) => {
              return p.title === card.title
                ? { ...p, stock: Math.max(0, p.stock - amount) }
                : p;
            });
          });
        };

        return (
          <>
            <CardList cards={cards} buyHandler={buyHandler} />
          </>
        );
      };

      root.render(<App />);
    </script>
  </body>
</html>
